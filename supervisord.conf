[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:nextjs]
command=npm run start
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:evolution]
command=sh -c "npx prisma migrate deploy && npm run start:prod"
directory=/evolution
environment=PORT="8080",API_KEY="apikey_whatscommerce_dev_2026",AUTHENTICATION_API_KEY="apikey_whatscommerce_dev_2026",DATABASE_PROVIDER="postgresql"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
